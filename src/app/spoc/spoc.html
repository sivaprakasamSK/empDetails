<div class="bg-[#FEFEFE] w-full min-h-screen overflow-x-hidden">
  <div class="p-4 sm:p-6 lg:p-8">


    <div class="max-w-[1400px] mx-auto flex flex-col sm:flex-row justify-end items-center mb-8 gap-4">
      <div class="w-full sm:w-80 relative">
        <input type="text" 
               placeholder="Search by branch name or code..." 
               [ngModel]="searchText()"
               (ngModelChange)="onSearchChange($event)" 
               class="w-full bg-[#EDECEC] border border-slate-300 px-4 py-2.5 rounded-xl text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all shadow-sm" />
      </div>
    </div>


    <div class="max-w-[1400px] mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
      @for (branch of paginatedBranches(); track branch.branchId) {
        <app-card [branch]="branch" (open)="openEmployeeDetails($event)"></app-card>
      } @empty {
        <div class="col-span-full text-center py-20 text-slate-400">
          <p class="text-xl">No branches found.</p>
        </div>
      }
    </div>


    @if (totalPages() > 1) {
      <div class="max-w-[1400px] mx-auto flex flex-col sm:flex-row justify-center items-center gap-6 mt-12 pb-16">
        <button class="px-6 py-2 bg-blue-600 hover:bg-blue-800 text-white rounded-xl disabled:opacity-30 transition-all" 
                [disabled]="currentPage() === 1"
                (click)="goToPrev()">
          Previous
        </button>

        <div class="px-4 py-2 bg-blue-600 rounded-lg">
          <span class="text-white">
            Page <strong>{{ currentPage() }}</strong> of {{ totalPages() }}
          </span>
        </div>

        <button class="px-6 py-2 bg-blue-600 hover:bg-blue-800 text-white rounded-xl disabled:opacity-30 transition-all"
                [disabled]="currentPage() === totalPages()" 
                (click)="goToNext()">
          Next
        </button>
      </div>
    }
  </div>

  
  @if (selectedBranch()) {
    <app-employee-card [branch]="selectedBranch()!" (close)="closeEmployeeDetails()">
    </app-employee-card>
  }
</div>
