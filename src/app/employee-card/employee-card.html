<div
  class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-[100] p-4 sm:p-6 animate-in fade-in duration-300">

  <div class="bg-[#EDECEC] w-full max-w-full sm:max-w-4xl lg:max-w-6xl
           rounded-2xl sm:rounded-[2.5rem] shadow-2xl relative
           border border-slate-300 overflow-hidden flex flex-col
           max-h-[90vh]">

    <div class="flex flex-row justify-between items-center
             gap-4 p-4 sm:p-6 lg:p-8 border-b border-slate-200 bg-white shrink-0">

      <div class="flex gap-x-3 sm:gap-x-6 items-center min-w-0">
        <div class="p-2 rounded-lg shrink-0 xs:block">
          <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="bi bi-building"
            viewBox="0 0 16 16">
            <path
              d="M4 2.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm3.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zM4 5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zM7.5 5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zm2.5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zM4.5 8a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5zm2.5.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm3.5-.5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5z" />
            <path
              d="M2 1a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1zm11 0H3v14h3v-2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5V15h3z" />
          </svg>
        </div>

        <div class="truncate">
          <h2 class="text-lg sm:text-2xl font-bold text-slate-900 truncate">
            {{ branch.branchName }}
          </h2>
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse shrink-0"></span>
            <p class="text-[10px] sm:text-xs font-semibold tracking-wider uppercase text-slate-500 truncate">
              ID: {{ branch.branchId }}
            </p>
          </div>
        </div>
      </div>

      <button (click)="closeModal()" class="h-10 w-10 shrink-0 flex items-center justify-center rounded-full
               bg-slate-100 text-slate-500 hover:bg-red-50 hover:text-red-600
               transition-colors active:scale-90" aria-label="Close modal">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="p-4 sm:p-6 lg:p-8 overflow-y-auto bg-[#FAF9F6] flex-grow">
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">

        @for (emp of branch.employees; track emp.employeeId) {
        <div class="group bg-white border border-slate-200 rounded-2xl
                 p-4 hover:-translate-y-2 sm:p-5 shadow-sm hover:shadow-md transition-all
                 flex flex-col justify-between min-h-[160px]">

          <div class="space-y-4">
            <div class="flex justify-between items-start gap-2">
              <div class="min-w-0">
                <p class="font-bold text-slate-900  leading-tight truncate group-hover:whitespace-normal group-hover:overflow-visible group-hover:text-clip">
                  {{ emp.name }}
                </p>
                <p class="text-[15px] text-slate-400 uppercase font-medium mt-1">
                  #{{ emp.employeeId }}
                </p>
              </div>

              <div class="flex flex-wrap gap-1 justify-end shrink-0">
                @for (role of emp.roles; track role) {
                <span
                  class="text-[10px] bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md font-bold uppercase border border-blue-100">
                  {{ role }}
                </span>
                }
              </div>
            </div>

            <div class="flex items-center text-slate-600 text-xs sm:text-sm
                     bg-slate-100 p-2.5 rounded-xl border border-slate-100 overflow-hidden">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 text-black shrink-0" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
              <span class="truncate" [title]="emp.email">{{ emp.email }}</span>
            </div>
          </div>
        </div> 
        }
      </div>
    </div>

    <div class="p-4 border-t border-slate-200 text-center shrink-0 bg-white">
      <p class="text-xs sm:text-sm font-medium text-slate-500">
        Branch Census:
        <span class="font-bold text-slate-900">
          {{ branch.employees?.length ?? 0 }} Staff Members
        </span>
      </p>
    </div>
  </div>
</div>
